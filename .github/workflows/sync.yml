name: FINAL 100% WORKING for NEW REPO
on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Clone & Copy Files (Full Logs)
        run: |
          # 克隆主项目到临时目录
          git clone https://gitlab.linphone.org/BC/public/linphone-desktop.git tmp
          cd tmp

          # 按你要求的格式，逐个克隆子模块并打印日志
          git submodule init
          git config -f .gitmodules --get-regexp '^submodule\..*\.url$' | while read -r key url; do
            name=$(echo "$key" | sed -E 's/^submodule\.(.*)\.url$/\1/')
            path=$(git config -f .gitmodules "submodule.$name.path")
            
            start=$(date +"%Y-%m-%d %H:%M:%S")
            echo "开始克隆子模块[ $start ]：$name  地址：$url"

            git submodule update --init "$path"

            end=$(date +"%Y-%m-%d %H:%M:%S")
            filecount=$(find "$path" -type f | wc -l)
            abspath=$(realpath "$path")

            echo "克隆完成[ $end ][ 文件数：$filecount ]：$name  存储位置：$abspath"
            echo "-------------------------------------"
          done

          cd ..
          # 用rsync强制复制所有文件到仓库根目录，彻底解决复制失败
          rsync -av --exclude='.git' tmp/ .
          rm -rf tmp

      - name: Push to YOUR NEW REPO (100% Correct)
        run: |
          # ✅ 写死你新仓库的完整正确地址！绝对不再错！
          REPO_URL="https://github.com/wait2021/linphone-desktop-full-1.git"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # 强制添加所有文件，避免漏加
          git add -f .
          
          # 强制提交，就算无变化也不报错
          git commit -m "Init full source code" --allow-empty
          
          # 强制推送到你的新仓库main分支
          git push --force "$REPO_URL" main

          echo "====================================="
          echo "✅ 全部成功！代码已推送到你的新仓库："
          echo "https://github.com/wait2021/linphone-desktop-full-1"
          echo "====================================="
          
